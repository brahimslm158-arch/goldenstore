name: Clear Repository

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm wiping all files'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Abort if not confirmed
        if: ${{ github.event.inputs.confirm != 'DELETE' }}
        run: |
          echo "Confirmation failed. Type DELETE to proceed."
          exit 1

      - name: Delete all files (keep .git and this workflow)
        run: |
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +
          find .github -mindepth 1 -maxdepth 1 \
            ! -name 'workflows' \
            -exec rm -rf {} + 2>/dev/null || true
          find .github/workflows -mindepth 1 \
            ! -name 'clear-repo.yml' \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clear repository" || { echo "Nothing to delete."; exit 0; }
          git push
