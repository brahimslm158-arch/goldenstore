<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d0d0f">
<title>Golden Store</title>
<meta name="description" content="Golden Store - أفضل متجر للتطبيقات المجانية">
<link rel="icon" type="image/png" href="/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #0d0d0f;
  color: #e8e8ea;
  font-family: 'Tajawal', 'Roboto', system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}
.wrap { width: 100%; max-width: 360px; }
.logo {
  width: 120px;
  height: 120px;
  border-radius: 28px;
  margin-bottom: 20px;
  box-shadow: 0 16px 48px rgba(0,0,0,.4);
}
.name {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}
.name b { color: #f4c01f; }
.tagline {
  font-size: 16px;
  color: #a8abb3;
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 16px 24px;
  border-radius: 999px;
  background: linear-gradient(135deg, #f4c01f 0%, #ffd34d 100%);
  color: #062e6f;
  font-weight: 800;
  font-size: 18px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  box-shadow: 0 10px 32px rgba(244,192,31,.25);
  transition: transform .08s, filter .15s;
}
.btn:hover { filter: brightness(1.05); }
.btn:active { transform: scale(.98); }
.btn:disabled, .btn.no-link {
  background: #2e2e33;
  color: #82858d;
  cursor: not-allowed;
  box-shadow: none;
}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="/images/logo.png" alt="Golden Store">
  <div class="name" dir="ltr">Golden<b>Store</b></div>
  <p class="tagline">Golden Store<br>أفضل متجر للتطبيقات المجانية</p>
  <a id="downloadBtn" class="btn no-link" href="#">تحميل</a>
</div>

<script>
(function () {
  var btn = document.getElementById('downloadBtn');
  function setDownload(url) {
    if (url) {
      btn.href = url;
      btn.classList.remove('no-link');
      btn.setAttribute('download', 'goldenstore.apk');
    }
  }
  fetch('/api/app-update', { method: 'GET', credentials: 'same-origin' })
    .then(function (r) { return r.json().catch(function () { return null; }); })
    .then(function (data) { setDownload(data && (data.apk_url || data.url)); })
    .catch(function () {});
})();
</script>
</body>
</html>
