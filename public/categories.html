</script>

<main>
  <div class="container">
    <div class="section-head">
      <h2 class="section-title" id="cat-title">تصفّح حسب التصنيف</h2>
    </div>
    <div id="grid" class="categories-grid"><div class="center-spinner"><div class="spinner"></div></div></div>

    <div class="ad-slot" id="ad-bottom-cat">
    <script>
      atOptions = { 'key' : '3da308bf01979306add45ada0c4f4035', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };

<footer class="footer"></footer>

<script src="/js/icons.js?v=13"></script>
<script src="/js/lang.js?v=13"></script>
<script src="/js/common.js?v=13"></script>
<script>
(async function () {
  const { api, el, ico } = window.GS;
  const { t, catName } = window.GSLang;
  const grid = document.getElementById('grid');
  const catTitle = document.getElementById('cat-title');
  if (catTitle) catTitle.textContent = t('browseByCategory');
  try {
    const { categories } = await api('/api/categories');
    grid.innerHTML = '';
    categories.forEach((c) => {
      grid.append(el('a', { href: `/browse?category=${c.slug}`, class: 'category-card' },
        el('div', { class: 'category-icon' }, ico(c.icon)),
        el('div', { class: 'category-info' },
          el('div', { class: 'category-name' }, catName(c.slug)),
          el('div', { class: 'category-count' }, `${c.count || 0} ${t('catAppCount')}`),
        ),
      ));
    });
  } catch {
    grid.innerHTML = '';
    grid.append(el('div', { class: 'empty-state' },
      ico('info', 'icon icon-xxl'),
      el('p', null, t('catLoadError')),
    ));
  }
})();
</script>
</body>
</html>
