<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">
<title>تصفّح التطبيقات المهكرة — Goldenstore</title>
<link rel="icon" type="image/png" href="/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=6">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5684487584672639" crossorigin="anonymous"></script>
</head>
<body data-page="browse">

<header class="header"></header>

<div id="ad-top" class="container"></div>

<main>
  <div class="container">

    <div class="section-head">
      <h2 class="section-title" id="page-title">جميع التطبيقات المهكرة</h2>
      <span class="muted" id="result-count"></span>
    </div>

    <div class="filters-bar">
      <div class="chips" id="category-chips"></div>
      <div class="filters-row">
        <select class="select" id="sort-select">
          <option value="recent">الأحدث</option>
          <option value="popular">الأكثر تنزيلاً</option>
          <option value="stars">الأعلى تقييماً</option>
          <option value="name">حسب الاسم</option>
        </select>
      </div>
    </div>

    <div id="grid" class="app-grid"><div class="center-spinner"><div class="spinner"></div></div></div>

    <div class="mt-lg" style="text-align:center;">
      <button id="load-more" class="btn btn-secondary hidden">عرض المزيد</button>
    </div>

  </div>
</main>

<footer class="footer"></footer>

<script src="/js/icons.js?v=6"></script>
<script src="/js/common.js?v=6"></script>
<script src="/js/browse.js?v=6"></script>
</body>
</html>
