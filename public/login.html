<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<script src="/js/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0f">
<title>تسجيل الدخول — Golden Store</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/images/logo.png">
<link rel="apple-touch-icon" href="/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/play.css?v=1782648900">
</head>
<body data-page="login">
  <div class="gate" id="gate">
    <div class="logo"><img src="/images/logo.png" alt="Golden Store"></div>
    <h1>Golden<b>Store</b></h1>
    <p>اضغط متابعة للدخول إلى المتجر وتنزيل التطبيقات — لا يحتاج حساب Google.</p>

    <div class="gate-spinner" id="checking"><div class="spinner"></div></div>

    <button class="gbtn" id="signin" type="button" style="display:none">
      <span class="gbtn-label">متابعة</span>
    </button>

    <div class="gate-error hidden" id="error"></div>
    <div class="terms">بالمتابعة فإنك توافق على شروط الاستخدام وسياسة الخصوصية لـ Golden Store.</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="/js/icons.js?v=1782648900"></script>
  <script src="/js/lang.js?v=1782648900"></script>
  <script src="/js/firebase-auth.js?v=1782648900"></script>
  <script src="/js/login.js?v=1782648900"></script>
</body>
</html>
