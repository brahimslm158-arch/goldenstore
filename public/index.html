<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Goldenstore — متجر تطبيقات الأندرويد</title>

<link rel="icon" type="image/png" href="/images/logo.png">

<body data-page="home">

<header class="header"></header>

<main>
  <div class="container">

    <section class="hero">
      <div class="hero-eyebrow"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="m12 3 3.1 6.3 7 1-5 5 1.2 6.9L12 17.7 5.8 21l1.2-6.9-5-5 7-1z"/></svg> متجر تطبيقات حصري</div>
      <h1>تطبيقات أندرويد مختارة بعناية،<br><b>بتجربة ذهبية فاخرة.</b></h1>
      <p>تشكيلة منتقاة من أفضل التطبيقات. تنزيل آمن ومباشر، بدون إعلانات.</p>
      <div class="hero-actions">
        <a class="btn btn-primary btn-lg" href="/browse"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" fill="none" stroke-width="1.6"/></svg> تصفّح المتجر</a>
        <a class="btn btn-secondary btn-lg" href="/browse?featured=1"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="m12 2 3.1 6.3 7 1-5 5 1.2 6.9L12 17.7 5.8 21l1.2-6.9-5-5 7-1z"/></svg> الأكثر تميزاً</a>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">التطبيقات المميزة</h2>
        <a class="section-link" href="/browse?featured=1">عرض الكل ←</a>
      </div>
      <div id="featured-grid" class="app-grid"><div class="center-spinner"><div class="spinner"></div></div></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">التصنيفات</h2>
        <a class="section-link" href="/categories">جميع التصنيفات ←</a>
      </div>
      <div id="categories-grid" class="categories-grid"><div class="center-spinner"><div class="spinner"></div></div></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">أحدث الإضافات</h2>
        <a class="section-link" href="/browse">عرض الكل ←</a>
      </div>
      <div id="recent-grid" class="app-grid"><div class="center-spinner"><div class="spinner"></div></div></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">الأكثر تنزيلاً</h2>
